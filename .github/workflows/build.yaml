name: build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    # Apple Silicon (arm64) runner — required to build aarch64-darwin.
    # Free minutes on public repositories.
    runs-on: macos-14
    strategy:
      # emacs-gpu is experimental; don't let it cancel the emacs build.
      fail-fast: false
      matrix:
        package: [emacs, emacs-gpu]
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v17
        with:
          name: snglth
          # Repo secret: a Cachix auth token with write access to the cache.
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # Building the package automatically pushes it (and its deps) to the cache
      # via cachix-action's post-build hook.
      - run: nix build .#${{ matrix.package }} --print-build-logs
